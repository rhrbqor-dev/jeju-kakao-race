<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GPS 인증</title>
  <style>
    body { margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#f5f7fb; color:#172033; }
    main { max-width:520px; margin:0 auto; padding:26px 18px; }
    .card { background:white; border:1px solid #dfe5ef; border-radius:18px; padding:22px; box-shadow:0 8px 22px rgba(20,30,60,.07); }
    h1 { margin:0 0 12px; font-size:26px; }
    p { line-height:1.5; }
    button { margin-top:16px; width:100%; border:0; background:#2f6df6; color:white; padding:14px; border-radius:12px; font-weight:800; font-size:16px; cursor:pointer; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .msg { margin-top:14px; padding:12px; border-radius:12px; background:#eef4ff; white-space:pre-wrap; line-height:1.5; }
    .warn { background:#fff4df; color:#7a4a00; }
    .ok { background:#e7f7ef; color:#0f7b50; }
    .err { background:#ffe9e9; color:#b42323; }
    .small { color:#657188; font-size:13px; }
  </style>
</head>
<body>
<main>
  <div class="card">
    <h1>GPS 인증</h1>
    <p>현재 미션 장소에서 아래 버튼을 누른 뒤, 휴대폰 위치 권한을 허용해주세요.</p>
    <p class="small" id="info"></p>
    <button id="gpsBtn" type="button">현재 위치로 인증하기</button>
    <div id="msg" class="msg">버튼을 누르면 인증을 시작합니다.</div>
  </div>
</main>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const teamCode = params.get('team') || '';
  const missionCode = params.get('mission') || '';
  const token = params.get('token') || '';
  const actor = params.get('actor') || '';
  const btn = document.getElementById('gpsBtn');
  const msg = document.getElementById('msg');
  const info = document.getElementById('info');

  function setMsg(text, type) {
    msg.textContent = text;
    msg.className = 'msg' + (type ? ' ' + type : '');
  }

  function setBusy(isBusy) {
    btn.disabled = isBusy;
    btn.textContent = isBusy ? '위치 확인 중...' : '현재 위치로 인증하기';
  }

  info.textContent = `팀 코드: ${teamCode || '-'} / 미션: ${missionCode || '-'}`;

  if (!teamCode || !missionCode || !token) {
    setMsg('GPS 인증 주소 정보가 부족합니다. 카카오톡 챗봇의 GPS 인증 버튼을 다시 눌러서 열어주세요.', 'err');
  }

  async function sendLocation(position) {
    const body = {
      team_code: teamCode,
      mission_code: missionCode,
      token,
      actor,
      lat: position.coords.latitude,
      lng: position.coords.longitude
    };

    setMsg('현재 위치를 서버에 확인하고 있습니다...', 'warn');

    const res = await fetch('/api/public/verify/location', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      cache: 'no-store',
      credentials: 'same-origin'
    });

    const raw = await res.text();
    let data = {};
    try { data = raw ? JSON.parse(raw) : {}; }
    catch { data = { ok:false, message: raw || '서버 응답을 읽을 수 없습니다.' }; }

    if (!res.ok || data.ok === false) {
      throw new Error(data.message || 'GPS 인증에 실패했습니다.');
    }

    setMsg(data.message || 'GPS 인증 완료!', 'ok');
  }

  function getLocation(options) {
    return new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, options);
    });
  }

  async function verifyGps() {
    if (!teamCode || !missionCode || !token) {
      setMsg('GPS 인증 주소 정보가 부족합니다. 카카오톡 챗봇의 GPS 인증 버튼을 다시 눌러서 열어주세요.', 'err');
      return;
    }

    if (!window.isSecureContext && location.hostname !== 'localhost') {
      setMsg('GPS 인증은 보안 주소(https)에서만 작동합니다. Render의 https 주소로 접속해주세요.', 'err');
      return;
    }

    if (!navigator.geolocation) {
      setMsg('이 브라우저는 GPS 위치 기능을 지원하지 않습니다. 카카오톡 우측 상단 메뉴에서 외부 브라우저로 열어 다시 시도해주세요.', 'err');
      return;
    }

    setBusy(true);
    setMsg('위치 권한 요청 중입니다. 권한 팝업이 뜨면 허용을 눌러주세요.', 'warn');

    try {
      // 일부 휴대폰/카카오 인앱브라우저에서 고정밀 위치가 오래 멈추는 경우가 있어 일반 위치부터 먼저 시도합니다.
      let position;
      try {
        position = await getLocation({ enableHighAccuracy: false, timeout: 10000, maximumAge: 0 });
      } catch (firstError) {
        setMsg('일반 위치 확인이 지연되어 고정밀 위치로 다시 시도합니다...', 'warn');
        position = await getLocation({ enableHighAccuracy: true, timeout: 20000, maximumAge: 0 });
      }

      await sendLocation(position);
    } catch (err) {
      let guide = err && err.message ? err.message : String(err);
      if (err && err.code === 1) guide = '위치 권한이 거부되었습니다. 브라우저/카카오톡 위치 권한을 허용한 뒤 다시 시도해주세요.';
      if (err && err.code === 2) guide = '현재 위치를 확인할 수 없습니다. 실외에서 GPS를 켠 뒤 다시 시도해주세요.';
      if (err && err.code === 3) guide = '위치 확인 시간이 초과되었습니다. 카카오톡 우측 상단 메뉴에서 외부 브라우저로 열어 다시 시도하면 더 잘 작동합니다.';
      setMsg('GPS 인증 실패\n' + guide, 'err');
    } finally {
      setBusy(false);
    }
  }

  btn.addEventListener('click', verifyGps);
  window.verifyGps = verifyGps;
})();
</script>
</body>
</html>
