<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>실시간 랭킹</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(255,255,255,.08);
      --panel2: rgba(255,255,255,.12);
      --text: #f7fbff;
      --muted: #aebbd0;
      --gold: #ffd166;
      --silver: #d8dee9;
      --bronze: #d8945f;
      --accent: #4dabf7;
      --ok: #51cf66;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #153a6b 0, transparent 34%), linear-gradient(135deg, #07111f, #0d1830 52%, #101828);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }
    .wrap { width: min(1280px, 94vw); margin: 0 auto; padding: 34px 0 60px; }
    header { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 26px; }
    h1 { margin: 0; font-size: clamp(34px, 5vw, 68px); line-height: 1; letter-spacing: -2px; }
    .subtitle { margin-top: 12px; color: var(--muted); font-size: clamp(15px, 1.8vw, 22px); }
    .status { text-align: right; color: var(--muted); font-size: 15px; line-height: 1.6; }
    .pill { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; background: var(--panel); border: 1px solid rgba(255,255,255,.12); border-radius:999px; color: var(--text); }
    .dot { width:10px; height:10px; border-radius:50%; background: var(--ok); box-shadow: 0 0 14px var(--ok); }
    .top3 { display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 24px 0; align-items:end; }
    .podium { background: var(--panel); border: 1px solid rgba(255,255,255,.12); border-radius: 22px; padding: 22px; min-height: 180px; box-shadow: 0 18px 40px rgba(0,0,0,.25); position:relative; overflow:hidden; }
    .podium::after { content:""; position:absolute; inset:auto -30px -70px auto; width:150px; height:150px; border-radius:50%; background: rgba(255,255,255,.08); }
    .podium.rank1 { min-height: 230px; border-color: rgba(255,209,102,.45); }
    .podium .medal { font-size: 44px; margin-bottom: 8px; }
    .podium .rank { color: var(--muted); font-weight:800; }
    .podium .name { font-size: clamp(24px, 3vw, 38px); font-weight: 900; margin: 6px 0 10px; white-space: nowrap; overflow:hidden; text-overflow:ellipsis; }
    .podium .score { font-size: clamp(28px, 4vw, 48px); font-weight: 950; }
    .podium .meta { color: var(--muted); margin-top: 6px; }
    .tableBox { background: var(--panel); border: 1px solid rgba(255,255,255,.12); border-radius: 22px; overflow:hidden; box-shadow: 0 18px 40px rgba(0,0,0,.25); }
    table { width:100%; border-collapse: collapse; }
    th, td { padding: 16px 18px; text-align:left; border-bottom: 1px solid rgba(255,255,255,.09); }
    th { color: var(--muted); font-size: 14px; letter-spacing:.5px; text-transform: uppercase; background: rgba(255,255,255,.05); }
    td { font-size: clamp(16px, 1.8vw, 24px); font-weight: 750; }
    tr:last-child td { border-bottom: 0; }
    .rankCell { width: 90px; font-size: clamp(22px, 2.4vw, 34px); font-weight:950; }
    .teamCode { color: var(--muted); font-size: 15px; font-weight: 700; margin-top: 4px; }
    .scoreCell { font-size: clamp(22px, 2.8vw, 38px); color: #e8f3ff; text-align:right; }
    .num { text-align:right; }
    .empty, .error { padding: 50px 24px; text-align:center; color: var(--muted); font-size: 22px; }
    .error { color: var(--danger); }
    .flash { animation: flash .75s ease; }
    @keyframes flash { from { background: rgba(77,171,247,.22); } to { background: transparent; } }
    @media (max-width: 820px) {
      header { align-items:flex-start; flex-direction:column; }
      .status { text-align:left; }
      .top3 { grid-template-columns: 1fr; }
      .podium, .podium.rank1 { min-height:auto; }
      th:nth-child(4), td:nth-child(4), th:nth-child(5), td:nth-child(5) { display:none; }
      th, td { padding: 13px 12px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1 id="title">실시간 랭킹</h1>
        <div class="subtitle">점수 우선 · 동점 시 완주 소요시간 기준</div>
      </div>
      <div class="status">
        <div class="pill"><span class="dot"></span><span>자동 갱신 중</span></div>
        <div>갱신 주기: <b id="intervalText">3초</b></div>
        <div>마지막 갱신: <b id="updatedAt">-</b></div>
      </div>
    </header>

    <section class="top3" id="top3"></section>

    <section class="tableBox">
      <table>
        <thead>
          <tr>
            <th>순위</th>
            <th>팀명</th>
            <th class="num">점수</th>
            <th class="num">완료 미션</th>
            <th class="num">소요시간</th>
          </tr>
        </thead>
        <tbody id="rankingBody">
          <tr><td colspan="5" class="empty">랭킹을 불러오는 중입니다...</td></tr>
        </tbody>
      </table>
    </section>
  </div>

<script>
  const REFRESH_MS = 3000;
  const $ = (id) => document.getElementById(id);
  let prevSnapshot = '';

  $('intervalText').textContent = Math.round(REFRESH_MS / 1000) + '초';

  function esc(v) {
    return String(v ?? '').replace(/[&<>'"]/g, (c) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[c]));
  }

  function formatDuration(sec) {
    if (sec === null || sec === undefined || Number.isNaN(Number(sec))) return '-';
    const n = Math.max(0, Number(sec));
    const h = Math.floor(n / 3600);
    const m = Math.floor((n % 3600) / 60);
    const s = n % 60;
    if (h > 0) return `${h}시간 ${m}분 ${s}초`;
    if (m > 0) return `${m}분 ${s}초`;
    return `${s}초`;
  }

  function medal(rank) {
    if (rank === 1) return '🥇';
    if (rank === 2) return '🥈';
    if (rank === 3) return '🥉';
    return '';
  }

  function renderTop3(rankings) {
    const top = rankings.slice(0, 3);
    if (!top.length) {
      $('top3').innerHTML = '';
      return;
    }
    const ordered = [top[1], top[0], top[2]].filter(Boolean);
    $('top3').innerHTML = ordered.map((r) => `
      <div class="podium ${r.rank === 1 ? 'rank1' : ''}">
        <div class="medal">${medal(r.rank)}</div>
        <div class="rank">${r.rank}위</div>
        <div class="name">${esc(r.team_name)}</div>
        <div class="score">${Number(r.total_score || 0).toLocaleString()}점</div>
        <div class="meta">${esc(r.team_code)} · ${r.completed_count || 0}개 완료 · ${formatDuration(r.duration_seconds)}</div>
      </div>
    `).join('');
  }

  function renderTable(rankings) {
    if (!rankings.length) {
      $('rankingBody').innerHTML = '<tr><td colspan="5" class="empty">아직 등록된 팀이 없습니다.</td></tr>';
      return;
    }
    $('rankingBody').innerHTML = rankings.map((r) => `
      <tr>
        <td class="rankCell">${r.rank <= 3 ? medal(r.rank) + ' ' : ''}${r.rank}</td>
        <td>
          <div>${esc(r.team_name)}</div>
          <div class="teamCode">${esc(r.team_code)} · ${r.status === 'finished' ? '완주' : '진행중'}</div>
        </td>
        <td class="scoreCell">${Number(r.total_score || 0).toLocaleString()}점</td>
        <td class="num">${Number(r.completed_count || 0)}개</td>
        <td class="num">${formatDuration(r.duration_seconds)}</td>
      </tr>
    `).join('');
  }

  async function loadRanking() {
    try {
      const res = await fetch('/api/public/rankings', { cache: 'no-store' });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.message || '랭킹 조회 실패');
      const rankings = data.rankings || [];
      if (data.event?.event_name) $('title').textContent = `${data.event.event_name} 실시간 랭킹`;
      renderTop3(rankings);
      renderTable(rankings);
      const now = new Date(data.server_time || Date.now());
      $('updatedAt').textContent = now.toLocaleTimeString('ko-KR', { hour12: false });
      const snapshot = JSON.stringify(rankings.map((r) => [r.rank, r.team_code, r.total_score, r.completed_count, r.duration_seconds]));
      if (prevSnapshot && prevSnapshot !== snapshot) document.body.classList.add('flash');
      setTimeout(() => document.body.classList.remove('flash'), 800);
      prevSnapshot = snapshot;
    } catch (e) {
      $('rankingBody').innerHTML = `<tr><td colspan="5" class="error">${esc(e.message || '랭킹 조회 실패')}</td></tr>`;
    }
  }

  loadRanking();
  setInterval(loadRanking, REFRESH_MS);
</script>
</body>
</html>
